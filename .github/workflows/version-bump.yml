name: Version Bump

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.claude-plugin/plugin.json'
      - '.claude-plugin/marketplace.json'

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        id: bump
        run: |
          # Read current version from plugin.json
          CURRENT=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          echo "Current version: $CURRENT"

          # Bump patch (1.2.3 → 1.2.4)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          # Update plugin.json
          python3 - "$NEW_VERSION" <<'PYEOF'
          import json, sys
          v = sys.argv[1]
          with open('.claude-plugin/plugin.json') as f: d = json.load(f)
          d['version'] = v
          with open('.claude-plugin/plugin.json', 'w') as f: json.dump(d, f, indent=2); f.write('\n')
          PYEOF

          # Update marketplace.json
          python3 - "$NEW_VERSION" <<'PYEOF'
          import json, sys
          v = sys.argv[1]
          with open('.claude-plugin/marketplace.json') as f: d = json.load(f)
          for plugin in d.get('plugins', []):
              plugin['version'] = v
          with open('.claude-plugin/marketplace.json', 'w') as f: json.dump(d, f, indent=2); f.write('\n')
          PYEOF

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin main --follow-tags
